<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Galeria Gamer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <ul class="menu">
      <li><a href="#">Início</a></li>
      <li><a href="#">Jogos</a></li>
      <li><a href="#">Galeria</a></li>
      <li><a href="#">Contato</a></li>
    </ul>
  </nav>

  <h1 class="brilho">🎮 Meus Jogos Favoritos</h1>

  <button class="botao-gamer">Entrar no Jogo</button>

  <section class="galeria">

    <div class="card">
      <div class="efeito-luz"></div>
      <img src="MINE.jpg" alt="Minecraft">
      <div class="nome-jogo">Minecraft</div>
    </div>

    <div class="card">
      <div class="efeito-luz"></div>
      <img src="FORT.jpg" alt="Fortnite">
      <div class="nome-jogo">Fortnite</div>
    </div>

    <div class="card">
      <div class="efeito-luz"></div>
      <img src="FREE.jpg" alt="Free Fire">
      <div class="nome-jogo">Free Fire</div>
    </div>

    
    <div class="card">
      <div class="efeito-luz"></div>
      <img src="ROB.jpg" alt="Roblox">
      <div class="nome-jogo">Roblox</div>
    </div>

     <div class="card">
      <div class="efeito-luz"></div>
      <img src="UNDER.jpg" alt="Undertale">
      <div class="nome-jogo">Undertale</div>
    </div>

  </section>

</body>
</html>
